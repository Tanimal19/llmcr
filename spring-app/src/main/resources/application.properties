spring.application.name=llmcr

# MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/ragdb
spring.datasource.username=user
spring.datasource.password=123
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Spring AI Vector Store
spring.ai.mariadb.vector-store.table-name=embeddings
spring.ai.mariadb.vector-store.vector-column=embedding
spring.ai.mariadb.vector-store.dim=1536
spring.ai.mariadb.vector-store.initialize-schema=true

# Gemini API Key
spring.ai.gemini.api-key=${GOOGLE_GEMINI_API_KEY}