spring.application.name=llmcr

# MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/ragdb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# FAISS
llmcr.faiss.url=http://localhost:8000

# Disable Spring AI auto-configuration
spring.ai.chat.client.enabled=false
spring.ai.embedding.client.enabled=false

# Model Providers
spring.ai.openai.api-key=none
spring.ai.google.genai.api-key=${GOOGLE_GEMINI_API_KEY}

# Models
llmcr.chat.small.openai.url=http://localhost:10001
llmcr.chat.small.provider=openai
llmcr.chat.small.model=LFM2.5-1.2B-Thinking-Q8_0
llmcr.chat.small.llama.ctx-size=16384

llmcr.chat.large.openai.url=none
llmcr.chat.large.provider=google.genai
llmcr.chat.large.model=gemini-3.1-pro

llmcr.embedding.openai.url=http://localhost:10002
llmcr.embedding.provider=openai
llmcr.embedding.model=harrier-oss-v1-0.6b.Q8_0
llmcr.embedding.llama.ctx-size=4096

llmcr.reranking.openai.url=http://localhost:10003
llmcr.reranking.provider=openai
llmcr.reranking.model=zerank-2.Q8_0
llmcr.reranking.llama.ctx-size=4096

# llama.cpp auto-start
llmcr.llama.autostart.enabled=true
llmcr.llama.modeldir=/Users/bobch/models
llmcr.llama.command=llama-server
llmcr.llama.ctx-size=4096
llmcr.llama.batch-size=512
llmcr.llama.ubatch-size=128
llmcr.llama.parallel=1
llmcr.llama.start-timeout-ms=15000

# Optional modules
llmcr.reflection.enable=false
llmcr.reflection.iterations=3

# Logging
logging.pattern.console=[%d{yyyy-MM-dd HH:mm:ss}] [%p] %logger{0}: %msg%n
logging.level.root=INFO