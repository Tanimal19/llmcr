spring.application.name=llmcr
spring.ai.model.chat=google-genai
spring.ai.model.embedding=ollama

# ETL Settings
etl.options.extract.pdf.maxParagraphLength=3000
etl.options.extract.ascii.maxParagraphLength=3000
etl.options.transform.maxParagraphsPerNode=10
etl.options.transform.requestPerMinute=2
etl.backup.transformChatHistoryFile=transform_history.json

# MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/ragdb
spring.datasource.username=user
spring.datasource.password=123
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Faiss
faiss.service.url=http://localhost:8000

# Gemini Settings (chat)
spring.ai.google.genai.api-key=${GOOGLE_GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemma-3-27b-it

# Ollama Settings (embedding)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.embedding.options.model=embeddinggemma:300m